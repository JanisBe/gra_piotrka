name: Build APK

on:
  push:
    branches:
      - main
      - master
      - 'feature/**'
      - 'hotfix/**'

# Anuluj poprzedni build przy nowym pushu na tę samą gałąź
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Zasada najmniejszych uprawnień
permissions:
  contents: read

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'BUILD')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'        # cache Gradle → szybszy build

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'  # przypięta wersja = reprodukowalny build
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/debug-info  # utrudnia reverse engineering

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gra-Piotrka          # bez .apk — GitHub sam dodaje rozszerzenie
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30         # zamiast domyślnych 90 dni
          if-no-files-found: error   # jawny błąd gdy APK nie powstał